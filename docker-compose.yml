services:
  backend:
    build: ./backend
    env_file: .env
    environment:
      - CSV_DIR=/app/data
      - DATALAKE_URL=http://ohlc-datalake-api:8000
    volumes:
      - ./data:/app/data:ro
    ports:
      - "8080:8000"
    networks:
      - default
      - datalake
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_WS_URL: ws://localhost:3000/ws/stream
    ports:
      - "7890:3000"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  datalake:
    external: true
    name: datalake-api_datalake-network
